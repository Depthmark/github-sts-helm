{{- if .Values.networkPolicy.native.enabled -}}
{{- $native := .Values.networkPolicy.native -}}
{{- $renderIngress := or (gt (len $native.from) 0) (gt (len $native.extraIngress) 0) -}}
{{- $renderEgress := or .Values.networkPolicy.allowKubeDns (gt (len $native.cidrs) 0) (gt (len $native.extraEgress) 0) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "github-sts.fullname" . }}
  labels:
    {{- include "github-sts.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "github-sts.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if $renderIngress }}
  ingress:
    {{- with $native.from }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - port: http
          protocol: TCP
    {{- end }}
    {{- with $native.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  {{- if $renderEgress }}
  egress:
    {{- if .Values.networkPolicy.allowKubeDns }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}
    {{- with $native.cidrs }}
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
    {{- with $native.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
