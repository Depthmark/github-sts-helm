---
name: Integration Test

on:
  pull_request:
    branches: [main]
    paths:
      - charts/**
      - .github/workflows/integration.yml
  push:
    branches: [main]
    paths:
      - charts/**
      - .github/workflows/integration.yml
  workflow_call: {}

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  kind-integration:
    name: Kind Integration Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout helm chart
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout github-sts source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Depthmark/github-sts
          path: github-sts-src
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: github-sts-test

      - name: Read appVersion from Chart.yaml
        id: chart
        run: |
          APP_VERSION=$(grep '^appVersion:' charts/github-sts/Chart.yaml | awk '{print $2}')
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building image with tag: ${APP_VERSION}"

      - name: Build and load image into Kind
        run: |
          docker build -t ghcr.io/depthmark/github-sts:${{ steps.chart.outputs.app_version }} github-sts-src/
          kind load docker-image ghcr.io/depthmark/github-sts:${{ steps.chart.outputs.app_version }} --name github-sts-test

      - name: Generate dummy RSA private key
        run: |
          openssl genrsa 2048 > /tmp/dummy-private-key.pem

      - name: Create test namespace and secret
        run: |
          kubectl create namespace github-sts-test
          kubectl create secret generic github-app-dummy-credentials \
            --namespace github-sts-test \
            --from-file=github-app-private-key=/tmp/dummy-private-key.pem

      - name: Install chart
        run: |
          helm install github-sts charts/github-sts \
            --namespace github-sts-test \
            --set github.apps.default.appId=12345 \
            --set github.apps.default.existingSecret=github-app-dummy-credentials \
            --set image.pullPolicy=Never \
            --wait \
            --timeout 120s

      - name: Verify deployment is running
        run: |
          kubectl -n github-sts-test rollout status deployment/github-sts --timeout=60s
          kubectl -n github-sts-test get pods -l app.kubernetes.io/name=github-sts

      - name: Verify pod is ready
        run: |
          POD=$(kubectl -n github-sts-test get pod -l app.kubernetes.io/name=github-sts -o jsonpath='{.items[0].metadata.name}')
          READY=$(kubectl -n github-sts-test get pod "$POD" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
          echo "Pod ${POD} Ready: ${READY}"
          [ "$READY" = "True" ]

      - name: Verify configmap contents
        run: |
          CONFIG=$(kubectl -n github-sts-test get configmap github-sts-config -o jsonpath='{.data.config\.yaml}')
          echo "$CONFIG"
          echo "$CONFIG" | grep -q 'app_id: 12345'
          echo "$CONFIG" | grep -q 'port: 8080'
          echo "$CONFIG" | grep -q 'backend: "memory"'
          echo "ConfigMap validation passed"

      - name: Verify secret is mounted
        run: |
          POD=$(kubectl -n github-sts-test get pod -l app.kubernetes.io/name=github-sts -o jsonpath='{.items[0].metadata.name}')
          # Check the volume mount exists (read-only filesystem, so we check via mount info)
          kubectl -n github-sts-test get pod "$POD" -o jsonpath='{.spec.containers[0].volumeMounts[*].mountPath}' | grep -q '/etc/github-sts/apps/default'
          echo "Secret volume mount verified"

      - name: Verify service exists
        run: |
          kubectl -n github-sts-test get service github-sts
          SVC_PORT=$(kubectl -n github-sts-test get service github-sts -o jsonpath='{.spec.ports[0].port}')
          echo "Service port: ${SVC_PORT}"
          [ "$SVC_PORT" = "8080" ]

      - name: Run Helm tests (health, readiness, metrics)
        run: |
          helm test github-sts --namespace github-sts-test --timeout 60s

      - name: Verify security context
        run: |
          POD=$(kubectl -n github-sts-test get pod -l app.kubernetes.io/name=github-sts -o jsonpath='{.items[0].metadata.name}')
          RUN_AS_USER=$(kubectl -n github-sts-test get pod "$POD" -o jsonpath='{.spec.securityContext.runAsUser}')
          RUN_AS_NON_ROOT=$(kubectl -n github-sts-test get pod "$POD" -o jsonpath='{.spec.securityContext.runAsNonRoot}')
          READ_ONLY=$(kubectl -n github-sts-test get pod "$POD" -o jsonpath='{.spec.containers[0].securityContext.readOnlyRootFilesystem}')
          echo "runAsUser: ${RUN_AS_USER}, runAsNonRoot: ${RUN_AS_NON_ROOT}, readOnlyRootFilesystem: ${READ_ONLY}"
          [ "$RUN_AS_USER" = "65534" ]
          [ "$RUN_AS_NON_ROOT" = "true" ]
          [ "$READ_ONLY" = "true" ]
          echo "Security context validation passed"

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl -n github-sts-test get pods -o wide
          echo "=== Pod Describe ==="
          kubectl -n github-sts-test describe pods -l app.kubernetes.io/name=github-sts
          echo "=== Pod Logs ==="
          kubectl -n github-sts-test logs -l app.kubernetes.io/name=github-sts --tail=100
          echo "=== Events ==="
          kubectl -n github-sts-test get events --sort-by=.lastTimestamp
