---
name: CI Helm

on:
  pull_request:
    branches: [main]
    paths:
      - charts/**
      - .github/workflows/ci.yml
  push:
    branches: [main]
    paths:
      - charts/**
      - .github/workflows/ci.yml
  workflow_call: {}

concurrency:
  group: ci-helm-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  helm-docs:
    name: Helm Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin helm-docs

      - name: Run helm-docs
        run: helm-docs

      - name: Verify README is up to date
        run: |
          if ! git diff --quiet -- 'charts/*/README.md'; then
            echo "::error::README.md is out of date. Run 'make helm-docs' and commit the changes."
            git diff -- 'charts/*/README.md'
            exit 1
          fi
          echo "README.md is up to date."

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart
        run: helm lint charts/github-sts --strict

      - name: Lint chart with CI values
        run: |
          for f in charts/github-sts/ci/*.yaml; do
            echo "=== Linting with ${f} ==="
            helm lint charts/github-sts --strict -f "${f}"
          done

      - name: Render templates
        run: helm template test charts/github-sts > rendered.yaml

      - name: Render templates with CI values
        run: |
          for f in charts/github-sts/ci/*.yaml; do
            echo "=== Rendering with ${f} ==="
            helm template test charts/github-sts -f "${f}" > /dev/null
          done

      - name: Upload rendered manifests
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rendered-manifests
          path: rendered.yaml
          retention-days: 7

  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git

      - name: Run unit tests
        run: helm unittest charts/github-sts